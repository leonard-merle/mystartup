<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>TravelX</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <!-- BANNIÈRE -->
  <div style="
    height: 300px;
    background-image: url('./images/background.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  ">
    <h1 style="color:white; text-shadow: 2px 2px 10px black;">
      TravelX 🌍
    </h1>
    <h2 style="color:white; text-shadow: 2px 2px 10px black;">
      Explore the world
    </h2>
  </div>

  <!-- DESTINATIONS -->
  <div class="container">

    <h2>Our destinations</h2>

    <div class="destination">
      <img src="./images/paris.jpg">
      <div>
        <h3>Paris 🇫🇷</h3>
        <p>The city of love, culture and amazing food.</p>
      </div>
    </div>

    <div class="destination">
      <img src="./images/london.jpg">
      <div>
        <h3>London 🇬🇧</h3>
        <p>A vibrant city full of history and modern life.</p>
      </div>
    </div>

    <div class="destination">
      <img src="./images/newyork.jpg">
      <div>
        <h3>New York 🇺🇸</h3>
        <p>The city that never sleeps, full of energy.</p>
      </div>
    </div>

  </div>

  <!-- TYPEFORM -->
  <div class="container">
    <h2>Contact us</h2>

    <iframe 
      src="https://form.typeform.com/to/NisUTUvr" 
      width="100%" 
      height="500"
      frameborder="0">
    </iframe>

  </div>

</body>
</html>
